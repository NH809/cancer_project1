<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    font-family: Arial;
    text-align:center;
}

table {
    margin:auto;
    border-collapse: collapse;
    width: 80%;
    background: rgba(255,255,255,0.1);
}

th, td {
    padding:10px;
    border:1px solid white;
}

img {
    width:70px;
    border-radius:8px;
}

a {
    color:yellow;
}
</style>

</head>

<body>

<h2>👨‍⚕️ Admin Dashboard</h2>

<a href="/dashboard">📊 Charts</a> |
<a href="/history">📁 History</a> |
<a href="/logout">🚪 Logout</a>

<br><br>

<table>
<tr>
<th>ID</th><th>Name</th><th>Image</th><th>Result</th><th>Confidence</th><th>Stage</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td><img src="{{ url_for('static', filename='uploads/' + row[2]) }}"></td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}%</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
