<!DOCTYPE html>
<html>
<head>
<title>Cancer Predictor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    overflow: hidden;
}

/* 🔥 BLINKING TITLE */
.title {
    position: absolute;
    top: 40px;
    font-size: 32px;
    font-weight: bold;
    color: #00c6ff;
    text-shadow: 0 0 10px #00c6ff, 0 0 20px #0072ff;
    animation: blink 1.5s infinite alternate;
}

@keyframes blink {
    from { opacity: 1; }
    to { opacity: 0.5; }
}

/* BACKGROUND GLOW */
body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: #00c6ff;
    filter: blur(120px);
    top: -100px;
    left: -100px;
}

body::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: #0072ff;
    filter: blur(120px);
    bottom: -100px;
    right: -100px;
}

/* LOGIN CARD */
.card {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    text-align: center;
    color: white;
    position: relative;
    z-index: 2;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* ERROR */
.error {
    color: #ff6b6b;
    margin-top: 10px;
}

    /* 🔽 BOTTOM RIGHT NAME */
.credit {
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    color: #00c6ff;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="title">🧠 Cancer Predictor Web Page</div>

<div class="card">

<h2>🔐 Login Panel</h2>

<form method="POST">
    <input type="text" name="username" placeholder="👤 Username" required>
    <input type="password" name="password" placeholder="🔒 Password" required>
    <button type="submit">Login</button>
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

<div class="credit">
    Project by Nikita H
</div>

</body>
</html>
