<!DOCTYPE html>
<html>
<head>
<title>Doctor Panel</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:20px;
    background: rgba(0,0,0,0.4);
}

.navbar a {
    color:#00c6ff;
    text-decoration:none;
    margin-left:15px;
}

/* TABLE */
table {
    width:90%;
    margin:30px auto;
    border-collapse: collapse;
    background: rgba(255,255,255,0.05);
}

th, td {
    padding:10px;
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;
}

th {
    background:#00c6ff;
}

/* INPUT */
textarea {
    width:100%;
    height:50px;
    border-radius:5px;
}

/* BUTTON */
button {
    background:#00c6ff;
    border:none;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="navbar">
    <h2>👨‍⚕️ Doctor Panel</h2>
    <div>
        <a href="/">Home</a>
        <a href="/history">History</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<h2 style="text-align:center;">Patient Reports</h2>

<table>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Image</th>
    <th>Result</th>
    <th>Confidence</th>
    <th>Stage</th>
    <th>Doctor Note</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>

    <td>
        <img src="{{ url_for('static', filename='uploads/' + row[2]) }}" width="80">
    </td>

    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}%</td>
    <td>{{ row[5] }}</td>

    <!-- NOTE FORM -->
    <td>
        <form action="/add_note/{{ row[0] }}" method="POST">
            <textarea name="note">{{ row[6] if row|length > 6 else '' }}</textarea>
    </td>

    <td>
            <button type="submit">Save</button>
        </form>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
